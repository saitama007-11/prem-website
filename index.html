<!DOCTYPE html>
<html>
<head>

<title>Mind Reader</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

button{
padding:12px 22px;
font-size:18px;
border:none;
border-radius:8px;
background:#38bdf8;
color:white;
cursor:pointer;
margin-top:20px;
}

#grid{
margin-top:30px;
font-size:22px;
line-height:34px;
}

</style>

</head>

<body>

<h1>🔮 Mind Reader</h1>

<p>
Think of any two digit number.
</p>

<p>
Example: 23
</p>

<p>
1. Add the digits together (2+3=5)  
<br>
2. Subtract from original number (23-5=18)
</p>

<p>
Find your final number in the chart below.
Remember its symbol.
</p>

<button onclick="reveal()">Reveal Symbol</button>

<div id="grid"></div>

<h2 id="result"></h2>

<script>

let symbols=["★","☀","♣","◆","▲","☂","✿","☯","♠"]

let specialSymbol=symbols[Math.floor(Math.random()*symbols.length)]

let grid=""

for(let i=0;i<100;i++){

let sym

if(i%9==0){

sym=specialSymbol

}else{

sym=symbols[Math.floor(Math.random()*symbols.length)]

}

grid+=i+" : "+sym+"<br>"

}

document.getElementById("grid").innerHTML=grid

function reveal(){

document.getElementById("result").innerHTML=
"The symbol you are thinking of is: "+specialSymbol

}

</script>

</body>
</html>

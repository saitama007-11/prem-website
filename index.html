<!DOCTYPE html>
<html>
<head>
<title>The Peaceful Challenge</title>

<style>

body{
background: linear-gradient(#d8f3dc,#fefae0);
font-family: "Trebuchet MS", sans-serif;
text-align:center;
padding-top:100px;
color:#2d3748;
}

.container{
background:white;
display:inline-block;
padding:40px 60px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
font-weight:500;
margin-bottom:10px;
}

#stage{
font-size:20px;
margin-bottom:25px;
color:#4a5568;
}

button{
background:#9bd5a3;
border:none;
padding:12px 22px;
margin:10px;
font-size:16px;
border-radius:10px;
cursor:pointer;
transition:0.25s;
color:#1a202c;
}

button:hover{
background:#7ecf8c;
transform:scale(1.05);
}

#message{
margin-top:20px;
font-size:18px;
color:#6b7280;
}

</style>
</head>

<body>

<div class="container">

<h1>🌿 A Peaceful Little Challenge</h1>

<div id="stage">Stage 1 — Choose the correct button.</div>

<div id="buttons">
<button onclick="wrong()">Correct</button>
<button onclick="nextStage()">Definitely Correct</button>
<button onclick="wrong()">Also Correct</button>
</div>

<div id="message"></div>

</div>

<script>

let stage = 1

let sarcasm = [
"Hmm... not quite.",
"Interesting choice.",
"That seemed confident, but incorrect.",
"You trusted that button a little too much.",
"Peaceful environment, questionable decisions."
]

function wrong(){
let msg = sarcasm[Math.floor(Math.random()*sarcasm.length)]
document.getElementById("message").innerHTML = msg
}

function nextStage(){

stage++

if(stage==2){

document.getElementById("stage").innerHTML =
"Stage 2 — That was too easy. Try again."

document.getElementById("buttons").innerHTML = `
<button onclick="wrong()">This One</button>
<button onclick="wrong()">Maybe This</button>
<button onclick="nextStage()">Trust Me</button>
`

document.getElementById("message").innerHTML=""

}

else if(stage==3){

document.getElementById("stage").innerHTML =
"Stage 3 — The reward is near."

document.getElementById("buttons").innerHTML = `
<button onclick="wrong()">Left</button>
<button onclick="nextStage()">Center</button>
<button onclick="wrong()">Right</button>
`

document.getElementById("message").innerHTML="Choose wisely."

}

else{

document.getElementById("stage").innerHTML =
"🌱 Reward Unlocked"

document.getElementById("buttons").innerHTML=""

document.getElementById("message").innerHTML =
"Congratulations. You just wasted your time."

}

}

</script>

</body>
</html>
